<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>إلى ملاك 🌹</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #1e1e2f, #3a2a53, #6b3f8c);
    font-family: "Amiri", serif;
    display: flex;
    justify-content: center;
    align-items: center;
    direction: rtl;
    overflow: hidden;
    color: #fff;
  }

  .poetry-card {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(18px);
    padding: 50px;
    border-radius: 25px;
    width: 520px;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.5);
    z-index: 2;
    border: 1px solid rgba(255,255,255,0.2);
  }

  h1 {
    font-size: 32px;
    margin-bottom: 30px;
    color: #ffb3d9;
    letter-spacing: 1.2px;
    text-shadow: 0 0 8px rgba(255, 179, 217, 0.6);
  }

  .poem {
    font-size: 22px;
    line-height: 2.3;
    white-space: pre-line;
    min-height: 280px;
    opacity: 0;
    transition: opacity 1.5s ease;
  }

  button {
    margin-top: 25px;
    padding: 12px 32px;
    border: none;
    border-radius: 35px;
    background: #ff69a1;
    color: #fff;
    font-size: 17px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 8px 20px rgba(255,105,161,0.4);
  }

  button:hover {
    transform: scale(1.08);
    opacity: 0.95;
    box-shadow: 0 12px 25px rgba(255,105,161,0.6);
  }

  footer {
    margin-top: 22px;
    font-size: 15px;
    opacity: 0.75;
    font-style: italic;
  }

  .heart {
    position: absolute;
    color: rgba(255,182,193,0.3);
    font-size: 18px;
    animation: float 12s linear infinite;
  }

  @keyframes float {
    from { transform: translateY(100vh) scale(0.6); opacity: 0; }
    50% { opacity: 1; }
    to { transform: translateY(-10vh) scale(1.1); opacity: 0; }
  }
</style>
</head>
<body>

  <!-- 🎵 موسيقى هادئة -->
  <audio autoplay loop>
    <source src="Amr_Diab_Makanak_Official_Lyric_Video_كلمات_عمرو_دياب_مكانكMP3_128K.mp3" type="audio/mpeg">
  </audio>

  <div class="poetry-card">
    <h1>إلى ملاكي 🌹</h1>

    <div id="poem" class="poem"></div>

    <button onclick="changePoem()">قصيدة أخرى</button>


  </div>

  <script>
    const poems = [

`عنترة بن شداد:

ولقد ذكرتكِ والرماحُ نواهلٌ
مني وبيضُ الهندِ تقطرُ من دمي
فوددتُ تقبيلَ السيوفِ لأنها
لمعتْ كبارقِ ثغركِ المتبسّمِ
يا عبلُ إن هواكِ قد ملك الحشا
وأذلّ قلبي في هواكِ وغرّما
إنّي امرؤٌ سمحُ الخليقةِ ماجدٌ
لا أتّقي عارًا ولا أطلبُ المَغنَمِ`,

`جميل بثينة:

ألا ليتَ ريعانَ الشبابِ جديدُ
ودهراً تولّى يا بثينَ يعودُ
وكنتِ إذا ما جئتُ زائرَ أهلِها
طليقَ اللسانِ لا أخافُ وعيدُ
أُحبُّكِ حبًّا لو تحبينَ مثله
أصابكِ من وجدي عليَّ شديدُ
وما ذكرتكِ النفسُ إلا استراحت
ولا فارقَ القلبَ الحزينَ هُمودُ`,

`قيس بن الملوح:

أمرُّ على الديارِ ديارِ ليلى
أُقبّلُ ذا الجدارَ وذا الجدارا
وما حبُّ الديارِ شغفنَ قلبي
ولكن حبُّ من سكنَ الديارا
تعلّقتُ ليلى وهي ذاتُ تمائمٍ
ولم يبدُ للأترابِ من ثديِها حجمُ
صغيرينِ نرعى البهمَ يا ليتَ أنّنا
إلى اليومِ لم نكبر ولم تكبرِ البهمُ`,

`امرؤ القيس:

وبيضةِ خدرٍ لا يُرامُ خباؤها
تمتّعتُ من لهوٍ بها غيرَ معجلِ
تجاوزتُ أحراسًا إليها ومعشرًا
عليهم حصانٌ في الحديدِ مُسوّمُ
فقالتْ يمينَ اللهِ ما لكَ حيلةٌ
وما إن أرى عنكَ الغوايةَ تنجلي
فقلتُ لها سيري وأرخي زمامَه
ولا تُبعِديني من جناكِ المعلّلِ`,

`المتنبي:

أحبُّكِ يا من ليس في الأرضِ مثلُها
ولا في سماءِ الحبِّ شمسٌ سواها
تمرُّ بكَ الأيامُ وهي كأنّها
دقائقُ شوقٍ حين ألقاكِ فيها
إذا غبتِ عن عيني فقلبي مكانُكِ
وإن حضرتِ صارت عيوني مراياها
وما كنتُ ممّن يدخلُ العشقُ قلبَه
ولكن من يبصرْ جفونكِ يعشقِ`,

`كثير عزة:

رأيتُ عَزّةَ لمّا اعترضتْ
فهاجَ فؤادي ما كانَ خافيا
فقلتُ لها والقلبُ بينَ جوانحي
أُحبُّكِ حبًّا ليس يُخفى كما هيا
وما كنتُ أدري قبلَ حبِّكِ ما الهوى
ولا كان قلبي بالهوى متواليا
فصرتُ إذا ما غبتِ عني كأنني
فقدتُ من الدنيا السرورَ الباقيا`
    ];

    let lastIndex = -1;

    function changePoem() {
      let random;
      do {
        random = Math.floor(Math.random() * poems.length);
      } while (random === lastIndex);

      lastIndex = random;
      const poemEl = document.getElementById("poem");
      poemEl.style.opacity = 0;

      setTimeout(() => {
        poemEl.innerText = poems[random];
        poemEl.style.opacity = 1;
      }, 500);

      createHearts();
    }

    function createHearts() {
      for (let i = 0; i < 5; i++) {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerText = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (9 + Math.random() * 5) + "s";
        document.body.appendChild(heart);
        setTimeout(() => heart.remove(), 12000);
      }
    }

    changePoem();
  </script>

</body>
</html>
